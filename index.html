<!DOCTYPE html>
<html lang="de" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />

    <title>PrepTrack — Dein Vorrat. Immer im Blick.</title>
    <meta name="description" content="Offline-first PWA für Prepper und Vorratshaltung. Produkte scannen, MHD tracken, Benachrichtigungen erhalten." />
    <meta name="author" content="PrepTrack" />

    <!-- PWA -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#1a3a2a" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PrepTrack" />
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="./icons/icon-192x192.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PrepTrack — Dein Vorrat. Immer im Blick." />
    <meta property="og:description" content="Offline-first PWA für Prepper und Vorratshaltung." />
    <meta property="og:image" content="./screenshots/screenshot-desktop.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PrepTrack — Dein Vorrat. Immer im Blick." />
    <meta name="twitter:description" content="Offline-first PWA für Prepper und Vorratshaltung." />

    <!-- CSP -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.bunny.net; font-src 'self' https://fonts.bunny.net; img-src 'self' data: blob: https://images.openfoodfacts.org; connect-src 'self' https://world.openfoodfacts.org; media-src 'self' blob:; worker-src 'self';" />

    <!-- Preload -->
    <link rel="preconnect" href="https://fonts.bunny.net" />
    <link rel="preconnect" href="https://world.openfoodfacts.org" />
  </head>
  <body class="bg-primary-900 text-gray-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
