<!DOCTYPE html>
<html lang="de" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>PrepTrack — Vorratsverwaltung für Prepper | MHD-Tracker &amp; Barcode-Scanner PWA</title>
    <meta name="description" content="PrepTrack ist die kostenlose Offline-PWA zur Vorratsverwaltung. Barcode scannen, Mindesthaltbarkeitsdaten tracken, Lagerorte verwalten und Benachrichtigungen vor Ablauf erhalten. Für Prepper, Krisenvorsorge und Haushalt." />
    <meta name="author" content="Belkis Aslani" />
    <link rel="canonical" href="https://beko2210.github.io/Prepper_Log/" />

    <!-- PWA: manifest injected by vite-plugin-pwa -->
    <meta name="theme-color" content="#1a3a2a" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PrepTrack" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192x192.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PrepTrack — Dein Vorrat. Immer im Blick." />
    <meta property="og:description" content="Offline-first PWA für Prepper und Vorratshaltung." />
    <meta property="og:image" content="./screenshots/screenshot-desktop.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PrepTrack — Dein Vorrat. Immer im Blick." />
    <meta name="twitter:description" content="Offline-first PWA für Prepper und Vorratshaltung." />

    <!-- CSP -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.bunny.net; font-src 'self' https://fonts.bunny.net; img-src 'self' data: blob: https://images.openfoodfacts.org; connect-src 'self' https://world.openfoodfacts.org; media-src 'self' blob:; worker-src 'self'; manifest-src 'self';" />

    <!-- Preload -->
    <link rel="preconnect" href="https://fonts.bunny.net" />
    <link rel="preconnect" href="https://world.openfoodfacts.org" />
  </head>
  <body class="bg-primary-900 text-gray-100 antialiased">
    <script>
      // Apply dark mode synchronously before React renders to prevent flash
      (function() {
        var stored = localStorage.getItem('preptrack-dark-mode');
        if (stored === 'false') {
          document.documentElement.classList.remove('dark');
        } else if (stored === null) {
          if (!window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.remove('dark');
          }
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
