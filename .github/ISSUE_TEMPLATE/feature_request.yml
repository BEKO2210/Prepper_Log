name: "✨ Feature Request"
description: Suggest a new feature or improvement for PrepTrack
title: "[Feature]: "
labels: ["enhancement"]
assignees: ["BEKO2210"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: Is your feature request related to a problem? Describe it.
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
      placeholder: I would like to be able to...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - UI / Design
        - New Feature
        - Performance
        - Accessibility
        - Internationalization (i18n)
        - Data Management (Import/Export)
        - Barcode Scanner
        - Notifications
        - PWA / Installation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Important
        - Critical for my use case

  - type: textarea
    id: screenshots
    attributes:
      label: Mockups / Screenshots
      description: If applicable, add mockups or screenshots to illustrate your idea.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the feature request.
