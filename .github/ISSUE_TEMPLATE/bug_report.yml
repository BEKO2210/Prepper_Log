name: "🐛 Bug Report"
description: Report a bug or unexpected behavior in PrepTrack
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: ["BEKO2210"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.

  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - Desktop (Chrome)
        - Desktop (Firefox)
        - Desktop (Edge)
        - Desktop (Safari)
        - Android (Chrome)
        - Android (Other)
        - iPhone (Safari)
        - iPad (Safari)
        - Other
    validations:
      required: true

  - type: dropdown
    id: installation
    attributes:
      label: Installation Type
      options:
        - Browser (not installed)
        - Installed as PWA
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: PrepTrack Version
      description: Found in Settings at the bottom of the page.
      placeholder: "e.g. v1.88"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem.
